<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>EuroSignal — Scanner Actions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070b18;
    --bg2: #0d1326;
    --bg3: #111827;
    --border: rgba(255,255,255,0.07);
    --accent: #00e5a0;
    --accent2: #ff4d6d;
    --accent3: #fbbf24;
    --text: #e8edf5;
    --text2: #7a8499;
    --text3: #4a5568;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --card-r: 14px;
    --glow-green: 0 0 20px rgba(0,229,160,0.25);
    --glow-red: 0 0 20px rgba(255,77,109,0.25);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BG */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* NAV */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(7,11,24,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .nav-logo .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,229,160,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0,229,160,0); }
  }

  .nav-time {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.5px;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 53px;
    z-index: 99;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex: 1;
    min-width: 80px;
    padding: 11px 8px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }

  .tab.active {
    color: var(--accent);
  }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 16px; right: 16px;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
    box-shadow: var(--glow-green);
  }

  /* VIEWS */
  .view { display: none; padding: 16px; position: relative; z-index: 1; }
  .view.active { display: block; animation: fadeIn 0.25s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* SECTION TITLE */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    margin-top: 4px;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .badge-green { background: rgba(0,229,160,0.12); color: var(--accent); border: 1px solid rgba(0,229,160,0.2); }
  .badge-red { background: rgba(255,77,109,0.12); color: var(--accent2); border: 1px solid rgba(255,77,109,0.2); }
  .badge-yellow { background: rgba(251,191,36,0.12); color: var(--accent3); border: 1px solid rgba(251,191,36,0.2); }

  /* SIGNAL CARDS */
  .signal-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .signal-card:active { transform: scale(0.98); }

  .signal-card.entry {
    border-left: 3px solid var(--accent);
  }

  .signal-card.entry::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
    opacity: 0.4;
  }

  .signal-card.exit {
    border-left: 3px solid var(--accent2);
  }

  .signal-card.exit::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, var(--accent2), transparent);
    opacity: 0.4;
  }

  .signal-card.watch {
    border-left: 3px solid var(--accent3);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .ticker {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .company-name {
    font-size: 11px;
    color: var(--text3);
    margin-top: 2px;
  }

  .price-block {
    text-align: right;
  }

  .price {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .price-change {
    font-family: var(--mono);
    font-size: 11px;
    margin-top: 2px;
  }

  .price-change.up { color: var(--accent); }
  .price-change.down { color: var(--accent2); }

  /* INDICATORS ROW */
  .indicators {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .ind-chip {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--bg3);
    color: var(--text2);
    border: 1px solid var(--border);
    letter-spacing: 0.3px;
  }

  .ind-chip.bullish { color: var(--accent); border-color: rgba(0,229,160,0.2); background: rgba(0,229,160,0.06); }
  .ind-chip.bearish { color: var(--accent2); border-color: rgba(255,77,109,0.2); background: rgba(255,77,109,0.06); }
  .ind-chip.neutral { color: var(--accent3); border-color: rgba(251,191,36,0.2); background: rgba(251,191,36,0.06); }
  /* MA cross chips — plus visible, légèrement plus grand */
  .ind-chip.cross-bull {
    color: #fff; background: var(--accent); border-color: var(--accent);
    font-weight: 700; box-shadow: 0 0 8px rgba(0,229,160,0.35);
    animation: chipPulse 1.8s ease infinite;
  }
  .ind-chip.cross-bear {
    color: #fff; background: var(--accent2); border-color: var(--accent2);
    font-weight: 700; box-shadow: 0 0 8px rgba(255,77,109,0.35);
    animation: chipPulse 1.8s ease infinite;
  }
  /* Distance chips — couleur douce selon positif/negatif */
  .ind-chip.neutral-pos { color: rgba(0,229,160,0.7); border-color: rgba(0,229,160,0.12); background: rgba(0,229,160,0.04); }
  .ind-chip.neutral-neg { color: rgba(255,77,109,0.7); border-color: rgba(255,77,109,0.12); background: rgba(255,77,109,0.04); }
  @keyframes chipPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* SIGNAL BAR */
  .signal-bar-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .signal-label {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 0.5px;
    width: 38px;
    flex-shrink: 0;
  }

  .signal-bar {
    flex: 1;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }

  .signal-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }

  .fill-green { background: linear-gradient(90deg, var(--accent), #00b87a); }
  .fill-red { background: linear-gradient(90deg, var(--accent2), #c72b47); }
  .fill-yellow { background: linear-gradient(90deg, var(--accent3), #e6a800); }

  .signal-val {
    font-family: var(--mono);
    font-size: 10px;
    width: 32px;
    text-align: right;
    flex-shrink: 0;
  }

  /* MINI CHART */
  .mini-chart {
    height: 40px;
    margin-top: 10px;
    position: relative;
  }

  .mini-chart svg {
    width: 100%;
    height: 100%;
  }

  /* PORTFOLIO CARDS */
  .portfolio-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
  }

  .pf-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .pf-ticker {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
  }

  .pf-pnl {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
  }

  .pf-pnl.pos { color: var(--accent); }
  .pf-pnl.neg { color: var(--accent2); }

  .pf-details {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .pf-stat {
    background: var(--bg3);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }

  .pf-stat-label {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }

  .pf-stat-val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
  }

  /* ALERT ZONES */
  .alert-zone {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 11px;
    margin-top: 8px;
  }

  .alert-zone.danger { background: rgba(255,77,109,0.08); border: 1px solid rgba(255,77,109,0.2); color: var(--accent2); }
  .alert-zone.safe { background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2); color: var(--accent); }
  .alert-zone.warning { background: rgba(251,191,36,0.08); border: 1px solid rgba(251,191,36,0.2); color: var(--accent3); }

  /* SETTINGS */
  .settings-group {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    overflow: hidden;
    margin-bottom: 16px;
  }

  .settings-group-title {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 10px 14px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }

  .settings-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px;
    border-bottom: 1px solid var(--border);
  }

  .settings-row:last-child { border-bottom: none; }

  .settings-label {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 2px;
  }

  .settings-desc {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
  }

  .settings-input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    width: 80px;
    text-align: right;
    outline: none;
    -webkit-appearance: none;
  }

  .settings-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,160,0.1);
  }

  /* TOGGLE */
  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }

  .toggle input { display: none; }

  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .toggle input:checked + .toggle-track {
    background: rgba(0,229,160,0.2);
    border-color: var(--accent);
  }

  .toggle-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: var(--text3);
    border-radius: 50%;
    transition: all 0.25s;
  }

  .toggle input:checked + .toggle-track::after {
    transform: translateX(20px);
    background: var(--accent);
    box-shadow: var(--glow-green);
  }

  /* WATCHLIST ADD */
  .add-form {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 14px;
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
  }

  .add-input {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    outline: none;
  }

  .add-input:focus { border-color: var(--accent); }

  .btn-add {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .btn-add:active { transform: scale(0.96); opacity: 0.9; }

  /* SCAN BUTTON */
  .scan-btn {
    position: fixed;
    bottom: 24px;
    right: 20px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 14px 22px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    box-shadow: var(--glow-green), 0 8px 24px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    z-index: 200;
  }

  .scan-btn:active { transform: scale(0.95); }

  .scan-btn.scanning {
    background: var(--bg3);
    color: var(--accent);
    border: 1px solid var(--accent);
  }

  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SCORE RING */
  .score-section {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .score-card {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 14px;
    text-align: center;
  }

  .score-val {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }

  .score-desc {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg2);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 20px;
    border-radius: 20px;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    box-shadow: var(--glow-green);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* API CONFIG BANNER */
  .api-banner {
    background: rgba(251,191,36,0.07);
    border: 1px solid rgba(251,191,36,0.2);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .api-banner-icon { font-size: 18px; flex-shrink: 0; }

  .api-banner-text { font-size: 12px; color: var(--accent3); line-height: 1.5; }

  .api-banner-text strong { font-family: var(--mono); font-size: 11px; }

  /* EMPTY */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--text3);
    font-size: 13px;
  }

  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 2px; }

  /* SHORTLIST FILTER BUTTONS */
  .filter-btn {
    font-family: var(--mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text3);
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: rgba(0,229,160,0.1);
    border-color: rgba(0,229,160,0.35);
    color: var(--accent);
  }
  .filter-btn:active { transform: scale(0.95); }

  /* SHORTLIST RANK CARD */
  .rank-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--card-r);
    padding: 12px 14px;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
  }
  .rank-card.top3 { border-color: rgba(0,229,160,0.3); }
  .rank-card.top3::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .rank-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .rank-num {
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
    width: 30px;
    flex-shrink: 0;
    text-align: center;
  }
  .rank-num.gold   { color: #fbbf24; }
  .rank-num.silver { color: #94a3b8; }
  .rank-num.bronze { color: #c97c2e; }
  .rank-num.other  { color: var(--text3); }

  .rank-info { flex: 1; min-width: 0; }
  .rank-ticker { font-family: var(--mono); font-size: 14px; font-weight: 700; }
  .rank-meta { font-size: 10px; color: var(--text3); margin-top: 1px; }

  .rank-score-block { text-align: right; }
  .rank-score { font-family: var(--mono); font-size: 20px; font-weight: 700; }
  .rank-score-label { font-size: 9px; color: var(--text3); letter-spacing: 0.5px; }

  /* SCORE BREAKDOWN BAR */
  .score-breakdown {
    display: flex;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    gap: 1px;
    margin-bottom: 8px;
  }
  .score-seg { transition: width 0.6s ease; border-radius: 1px; }

  /* SIGNAL TAGS */
  .sig-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .sig-tag {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 4px;
    letter-spacing: 0.3px;
  }

  .rank-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .rank-stats { display: flex; gap: 12px; }
  .rank-stat { font-family: var(--mono); font-size: 10px; color: var(--text3); }
  .rank-stat span { color: var(--text); }

  /* CHECKBOX */
  .rank-check {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    background: var(--bg3);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    font-size: 12px;
  }
  .rank-check.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  /* PROGRESS BAR */
  .sl-progress {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
